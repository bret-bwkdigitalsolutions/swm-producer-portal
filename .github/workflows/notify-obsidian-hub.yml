name: Notify Obsidian Hub

# This is the ONLY workflow file needed in each project repo.
# All logic lives in the hub repo — this just sends a ping.

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to obsidian-hub
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/bretkramer/obsidian-hub/dispatches \
            -d '{
              "event_type": "living-state-sync",
              "client_payload": {
                "repo": "${{ github.repository }}",
                "force": "false"
              }
            }'
