    - generic [ref=e105]:
      - heading "Fan Culture" [level=2] [ref=e106]
      - blockquote [ref=e107]: Norwegian supporters are quieter than the Scots, drier than the English, and absolutely deadly with a chorus when they decide to use it. Expect a sea of red shirts, Viking helmets that the wearers know are silly and wear anyway, and a chant book that leans heavily on "Norge, Norge, Norge" repeated until the building shakes. The traveling support won't match the Tartan Army next door in volume, but they'll match anyone in commitment — Norway hasn't been to a World Cup since 1998 and these fans have been waiting their entire adult lives. If Haaland scores, the noise is going to peel paint.
    - generic [ref=e109]:
      - text: 💡
      - generic [ref=e110]: Fun Fact
      - paragraph [ref=e111]: Before this summer, Norway had not qualified for a World Cup since 1998 — meaning Erling Haaland, the most prolific goalscorer in European club football, had played exactly zero minutes at a World Cup or Euros entering his age-25 season. He scored 16 in qualifying. He scored more goals in qualifying than most countries scored as a team.
