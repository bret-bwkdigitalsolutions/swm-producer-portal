    - generic [ref=e64]:
      - heading "The Story" [level=2] [ref=e65]
      - generic [ref=e66]:
        - paragraph [ref=e67]: Norway has been the longest-running 'why aren't they at a tournament' team in European football for almost a decade. They had Haaland. They had Ødegaard. They had Sørloth, Berge, Ajer, a generation of players good enough to make Premier League and La Liga starting elevens. And they kept finding ways to lose qualifiers to Serbia, to Turkey, to anyone who showed up organized. They missed Euro 2020. They missed Qatar. They missed Euro 2024. The joke around European football was that Norway had assembled the most talented squad never to play a meaningful summer match.
        - paragraph [ref=e68]: That ended in November 2025. Norway went 8-for-8 in qualifying, scored 37 goals, beat Italy 4-1 in Oslo to clinch it, and Haaland did the post-match interview in Norwegian for what felt like the first time. Ståle Solbakken, the manager who took over in 2020 and patiently absorbed every loss while telling everyone the team would be ready when it mattered, got vindicated.
        - paragraph [ref=e69]: Now the question is whether they're actually any good in a tournament context. Norway has never been past the Round of 16 at a World Cup. They've been drawn into a brutal group with France. Haaland has never played a knockout match on this stage. None of that matters today. They're here. Erling Haaland is here. The longest wait in European football is over, and the rest of us get to find out what happens when the sport's most ridiculous goalscorer finally shows up at the World Cup.
    - generic [ref=e70]:
      - heading "3 Players to Know" [level=2] [ref=e71]
      - generic [ref=e72]:
        - article [ref=e73]:
          - generic [ref=e75]: E
          - generic [ref=e76]:
            - heading "Erling Haaland" [level=3] [ref=e77]
            - paragraph [ref=e78]: The numbers stopped being believable a while ago. Haaland, 25, scored 16 goals in eight qualifiers — scoring in every single game, doubling the next-best tally in Europe and equalling Lewandowski's all-time qualifying record — to drag Norway to their first World Cup in 28 years. He was born in 2000; his country hadn't been back since. The Manchester City striker has won everything at club level except this stage, and it's the only one he's never played on. France's center-backs get him first. If Norway top Group I instead of finishing behind Les Bleus, it'll be because Haaland decided the math was negotiable.
        - article [ref=e79]:
          - generic [ref=e81]: M
          - generic [ref=e82]:
            - heading "Martin Ødegaard" [level=3] [ref=e83]
            - paragraph [ref=e84]: "He debuted for Real Madrid's first team at 16 and spent a decade being the future. Now he's 27, Arsenal's captain, Norway's captain — and finally at a World Cup. His 2025-26 was brutal: a chronic shoulder problem in autumn, then a knee injury that limited him to 19 starts and kept resurfacing through spring. By May he was telling reporters he 'finally' felt right again. The timing matters: Norway's whole attacking idea is Ødegaard finding Haaland. Against Senegal's physical midfield and France's press, a healthy Ødegaard is the difference between a feel-good return and a genuinely dangerous team."
        - article [ref=e85]:
          - generic [ref=e87]: A
          - generic [ref=e88]:
            - heading "Antonio Nusa" [level=3] [ref=e89]
            - paragraph [ref=e90]: "The 21-year-old RB Leipzig winger Norwegians have been comparing to Neymar since he was a teenager at Club Brugge — and qualifying suggested they weren't exaggerating. Nusa produced two goals and three assists in the campaign, including a goal and assist in the 3-0 demolition of Italy and two assists in the 5-0 over Israel. He already has seven goals in 20 caps. Where Haaland is force and Ødegaard is control, Nusa is pure mischief: a dribbler who attacks fullbacks like he's owed money. Iraq and Senegal will sit deep against Norway; Nusa is the one who unlocks that."
    - generic [ref=e91]:
      - heading "The Food" [level=2] [ref=e92]
      - generic [ref=e93]:
        - generic [ref=e94]:
          - generic [ref=e95]: Signature Dish
          - paragraph [ref=e96]: "Norwegian food is built around what survives a long winter and a colder coast. The headliners: kjøttkaker (meatballs in brown gravy with lingonberry, the Sunday-dinner version of what IKEA serves), fårikål (slow-braised mutton and cabbage, the official national dish, which is just two ingredients and somehow works), and gravlaks — cured salmon with dill and mustard sauce that puts the standard American 'lox' to shame. Brunost, the brown caramelized whey cheese, is the divisive one. Norwegians put it on toast for breakfast and look at you like you're insane for asking why."
        - generic [ref=e97]:
          - generic [ref=e98]: Where to Eat in DFW
          - paragraph [ref=e99]: "DFW does not have a Norwegian restaurant. It barely has a Scandinavian one. Your honest options: The Wooden Spoon in Plano (1617 K Ave), a Scandinavian market and café with Swedish and Norwegian groceries, kanelbullar, and proper fika in the afternoon, and the Smörgåsbørd Sandwich Table at the Dallas Farmers Market (weekends only, smørrebrød done right). And yes — the IKEA in Frisco cafe does Swedish meatballs and lingonberry, which is close enough to Norwegian that any Norwegian fan will smirk and order them. We will keep looking."
