      - heading "Norway" [level=1] [ref=e49]
      - paragraph [ref=e50]: Erling Haaland has finally arrived at a major tournament — and he didn't come alone
    - generic [ref=e51]:
      - generic [ref=e52]:
        - generic [ref=e53]: Group
        - generic [ref=e54]: I
      - generic [ref=e55]:
        - generic [ref=e56]: Region
        - generic [ref=e57]: UEFA
