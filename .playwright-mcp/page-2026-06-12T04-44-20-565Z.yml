    - generic [ref=e65]:
      - heading "The Story" [level=2] [ref=e66]
      - generic [ref=e67]:
        - paragraph [ref=e68]: Italy is not at this World Cup. That sentence has been true at three of the last four tournaments. It still does not feel real to anyone who watched Fabio Cannavaro lift the trophy in Berlin in 2006, or watched Paolo Rossi in 1982, or watched any of the four blue-shirted championship parades on YouTube highlight reels. Italy is one of the great soccer nations on earth. Italy has now missed three consecutive World Cups, the first former champion ever to do that.
        - paragraph [ref=e69]: The latest disaster came on March 31 in Zenica, Bosnia. Italy were 1-0 up through Moise Kean. Alessandro Bastoni got sent off. Bosnia equalized late. Penalties. Italy lost 4-1 in the shootout. Gennaro Gattuso, the 2006 champion brought back as coach in June to fix what Spalletti couldn't, left the job by mutual consent three days later. The country is on its third manager of the cycle and has no idea who's next.
        - paragraph [ref=e70]: So why include Italy in a 2026 World Cup guide? Because they belong here. Because the diaspora in DFW will still gather in June, and they will still order the Aperol Spritzes, and they will still argue about Donnarumma. And because the absence is its own story — a four-time champion sitting out the biggest tournament ever staged, on its co-host's home soil, two hours' flight from where their grandparents emigrated. That's the kind of thing Italy will write operas about.
    - generic [ref=e71]:
      - heading "3 Players to Know" [level=2] [ref=e72]
      - generic [ref=e73]:
        - article [ref=e74]:
          - generic [ref=e76]: G
          - generic [ref=e77]:
            - heading "Gianluigi Donnarumma" [level=3] [ref=e78]
            - paragraph [ref=e79]: The Manchester City goalkeeper, 27 years old, who was supposed to be the spine of Italy for a decade and instead has watched two World Cups go by from his couch. He won Euro 2020 as a 22-year-old, was named player of the tournament, and has been Italy's first-choice keeper ever since. He'll be 30 by the next World Cup. The math on his international career is starting to get sad.
        - article [ref=e80]:
          - generic [ref=e82]: S
          - generic [ref=e83]:
            - heading "Sandro Tonali" [level=3] [ref=e84]
            - paragraph [ref=e85]: The Newcastle midfielder who served a 10-month gambling ban in 2023-24 and came back as one of the best No. 8s in the Premier League. Italy fans had pinned the rebuild around him and Calafiori. Tonali was magnificent in qualifying — he's just on a team that couldn't beat Norway and then couldn't beat Bosnia. The most cruel thing in soccer is doing your job perfectly on a team that doesn't.
        - article [ref=e86]:
          - generic [ref=e88]: R
          - generic [ref=e89]:
            - heading "Riccardo Calafiori" [level=3] [ref=e90]
            - paragraph [ref=e91]: The Arsenal left-back/center-back who was the breakout of Euro 2024 and the face of the 'next Italy.' Twenty-three years old, technically gifted, the kind of defender who treats the ball like a midfielder. He's the player you want to remember from this dark cycle, because by 2030 he'll be a captain and the country will need him.
    - generic [ref=e92]:
      - heading "The Food" [level=2] [ref=e93]
      - generic [ref=e94]:
        - generic [ref=e95]:
          - generic [ref=e96]: Signature Dish
          - paragraph [ref=e97]: Italian food in America has been flattened into red sauce and meatballs, which is fine, but it's not the point. The point is regional. A real Bolognese is a slow ragù with milk and a whisper of tomato. A real cacio e pepe is three ingredients (pasta, pecorino, black pepper) and the hardest dish on the menu to actually nail. Pizza in Naples is a wet, blistered, 90-second thing — closer to bread than to the foldable slab Americans grew up on. Tiramisu, properly, is mascarpone-eggs-coffee and nothing else.
        - generic [ref=e98]:
          - generic [ref=e99]: Where to Eat in DFW
          - paragraph [ref=e100]: Partenope (Downtown Dallas, with a second location in Richardson) — Naples-born chef Dino Santonicola makes Neapolitan pizza that has been ranked in the top 15 in the U.S. four years running. The pasta program is just as serious. For a watch party with no actual matches to watch, this is where DFW's Italian-American crowd will be drowning their sorrows in carbonara and Aglianico through June and July. Sprezza in Oak Lawn has permanently closed.
