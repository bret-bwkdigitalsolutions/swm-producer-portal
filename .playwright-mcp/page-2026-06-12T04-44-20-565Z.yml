    - generic [ref=e106]:
      - heading "Fan Culture" [level=2] [ref=e107]
      - blockquote [ref=e108]: Italian fan culture in 2026 is, frankly, in mourning. The bars in Little Italy neighborhoods across America that would normally be Azzurri-flag-draped are quiet, and the diaspora is split between adopting another team (Argentina is popular, given the Italo-Argentine pipeline), watching with bitter detachment, or refusing to watch entirely. If you do find an Italian-American watch crew this summer, expect espresso instead of beer, a lot of hand-gesturing about Bastoni's red card against Bosnia, and someone older quietly telling you about Paolo Rossi in 1982 — the last time Italy looked truly alive at this tournament. The grief is specific and operatic. Sit with it.
    - generic [ref=e110]:
      - text: 💡
      - generic [ref=e111]: Fun Fact
      - paragraph [ref=e112]: Italy has won the World Cup four times (1934, 1938, 1982, 2006). They have also now failed to qualify for it three times in a row — 2018, 2022, and 2026 — the first former champion in history to do that. Their last World Cup match was in 2014. A child born then is in middle school now and has never seen Italy at this tournament.
